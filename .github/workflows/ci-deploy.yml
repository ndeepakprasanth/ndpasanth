name: CI/CD Pipeline for Static Site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BUCKET_NAME: ai-static-site-2025-dpn
  AWS_REGION: us-east-1

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify site files exist
        run: |
          if [ ! -f site/index.html ]; then
            echo "Error: site/index.html not found"
            exit 1
          fi
          echo "Site files verified successfully"

      - name: Simulate deployment (learning mode)
        run: echo "Simulated deploy to ${{ job.environment.name }}"

      - name: Configure AWS credentials
        if: false
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::946248011760:role/GitHubS3DemoRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        if: false
        run: |
          aws s3 sync site/ s3://${{ env.BUCKET_NAME }} --delete --region ${{ env.AWS_REGION }}

#test direct push protection
  deploy-test:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: deploy-dev
    environment: test
    steps:
      - name: Simulate deployment (learning mode)
        run: echo "Simulated deploy to ${{ job.environment.name }}"

  deploy-qa:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: deploy-test
    environment: qa
    steps:
      - name: Simulate deployment (learning mode)
        run: echo "Simulated deploy to ${{ job.environment.name }}"

  deploy-preprod:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: deploy-qa
    environment: preprod
    steps:
      - name: Simulate deployment (learning mode)
        run: echo "Simulated deploy to ${{ job.environment.name }}"

  deploy-prod:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    needs: deploy-preprod
    environment: prod
    steps:
      - name: Simulate deployment (learning mode)
        run: echo "Simulated deploy to ${{ job.environment.name }}"
